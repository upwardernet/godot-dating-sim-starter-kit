name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  DISPLAY_NAME: "Sigma Date"

jobs:
  export-windows:
    name: Windows (.exe)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4
      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.6.3.stable ~/.local/share/godot/export_templates/4.6.3.stable
      - name: Build
        run: |
          mkdir -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" "build/windows/sigma-date.exe"
      - name: Embed PCK
        run: |
          if [ -f build/windows/sigma-date.pck ]; then
            cat build/windows/sigma-date.pck >> build/windows/sigma-date.exe
            rm build/windows/sigma-date.pck
            echo "PCK embedded"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/sigma-date.exe

  export-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4
      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.6.3.stable ~/.local/share/godot/export_templates/4.6.3.stable
      - name: Build
        run: |
          mkdir -p build/linux
          godot --headless --verbose --export-release "Linux/X11" "build/linux/sigma-date.x86_64"
      - name: Embed PCK
        run: |
          if [ -f build/linux/sigma-date.pck ]; then
            cat build/linux/sigma-date.pck >> build/linux/sigma-date.x86_64
            rm build/linux/sigma-date.pck
            echo "PCK embedded"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux/sigma-date.x86_64

  export-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          yes | cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" > /dev/null
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          unzip -q "Godot_v4.6.2-stable_linux.x86_64.zip"
          mv "Godot_v4.6.2-stable_linux.x86_64" godot
          chmod +x godot
      - name: Download export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          TPZ_DIR="$HOME/.local/share/godot/export_templates/4.6.2.stable"
          mkdir -p "$TPZ_DIR"
          unzip -q "Godot_v4.6.2-stable_export_templates.tpz" -d "$TPZ_DIR"
          mv "$TPZ_DIR/templates/"* "$TPZ_DIR/"
          rmdir "$TPZ_DIR/templates"
      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" 2>/dev/null
      - name: Setup directories
        run: mkdir -p build/android
      - name: Export
        run: ./godot --headless --export-debug "Android" "build/android/Sigma Date.apk"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/android/Sigma Date.apk

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Display structure
        run: ls -R
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.DISPLAY_NAME }} ${{ github.ref_name }}"
          body: |
            **Sigma Date** is a complete, playable 2D visual novel / dating simulator built in Godot 4.6 — ready to fork, customize, and make your own.

            ### Included in this release:
            - **sigma-date.exe** — Windows
            - **sigma-date.x86_64** — Linux
            - **Sigma Date.apk** — Android

            Drop in your own characters, backgrounds, story, and audio to create a unique dating sim.
          files: |
            windows/sigma-date.exe
            linux/sigma-date.x86_64
            android/Sigma Date.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
