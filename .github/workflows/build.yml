name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION_TAG: "4.6.2-stable"
  GODOT_VERSION: "4.6.2.stable"
  DISPLAY_NAME: "Sigma Date"

jobs:
  export-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          $tag = "$env:GODOT_VERSION_TAG"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$tag/Godot_v$($tag)_win64.exe.zip" -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath .
          Move-Item "Godot_v$($tag)_win64.exe" godot.exe
      - name: Download templates
        run: |
          $tag = "$env:GODOT_VERSION_TAG"
          $ver = "$env:GODOT_VERSION"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$tag/Godot_v$($tag)_export_templates.tpz" -OutFile templates.tpz
          $tpzDir = "$env:APPDATA\Godot\export_templates\$ver"
          New-Item -ItemType Directory -Path $tpzDir -Force
          Expand-Archive -Path templates.tpz -DestinationPath $tpzDir
          Get-ChildItem -Path "$tpzDir\templates\*" | Move-Item -Destination $tpzDir -Force
          Remove-Item "$tpzDir\templates" -Recurse -Force -ErrorAction SilentlyContinue
      - run: mkdir build\windows -Force
      - run: .\godot.exe --headless --export-release "Windows Desktop" "build/windows/Sigma Date.exe"
